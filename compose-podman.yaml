# Podman Compose Configuration for Permathadi Swara
# Minimal setup with PHP, MySQL, Redis, and Vite

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.podman
    container_name: permathadi-app
    working_dir: /var/www/html
    volumes:
      - ".:/var/www/html:Z"
    networks:
      - sail
    ports:
      - "8080:8000"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  mysql:
    image: "docker.io/mysql:8.0"
    container_name: permathadi-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: "rootpassword123"
      MYSQL_DATABASE: "permathadi_swara"
      MYSQL_USER: "sail"
      MYSQL_PASSWORD: "password"
    volumes:
      - "sail-mysql:/var/lib/mysql:Z"
    networks:
      - sail
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-prootpassword123"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  redis:
    image: "docker.io/redis:7-alpine"
    container_name: permathadi-redis
    ports:
      - "6379:6379"
    networks:
      - sail
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  vite:
    image: "docker.io/node:20-alpine"
    container_name: permathadi-vite
    working_dir: /var/www/html
    volumes:
      - ".:/var/www/html:Z"
    networks:
      - sail
    command: sh -c "if [ ! -d node_modules ]; then npm install; fi && npm run dev"
    environment:
      - NODE_ENV=development

networks:
  sail:
    driver: bridge

volumes:
  sail-mysql:
    driver: local
